name: Build & Release

on:
  workflow_dispatch:        # manual trigger from GitHub UI
  push:
    branches:
      - main               # runs CI on every merge to main
    tags:
      - 'v*'               # auto-triggers on any v0.9.2, v1.0.0, etc.

jobs:
  # ── Build on all three platforms in parallel ────────────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: CyberSurvivor-Windows
          - os: ubuntu-latest
            artifact: CyberSurvivor-Linux
          - os: macos-latest
            artifact: CyberSurvivor-macOS

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Linux needs SDL2 headers so pygame installs its native libs correctly
      - name: Install Linux SDL2 libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libsdl2-dev libsdl2-mixer-dev libsdl2-image-dev libsdl2-ttf-dev \
            libfreetype6-dev libportmidi-dev

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      # Read VERSION from settings.py without importing the full game package
      - name: Read version
        id: ver
        shell: python
        run: |
          import os
          with open("src/settings.py") as f:
              for line in f:
                  if line.startswith("VERSION"):
                      ver = line.split('"')[1]
                      with open(os.environ["GITHUB_OUTPUT"], "a") as out:
                          out.write(f"value={ver}\n")
                      break

      - name: Build with PyInstaller
        run: pyinstaller cyber_survivor.spec --clean --noconfirm

      - name: Package — Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: >
          Compress-Archive
          -Path dist/CyberSurvivor/*
          -DestinationPath "${{ matrix.artifact }}-v${{ steps.ver.outputs.value }}.zip"

      - name: Package — Linux / macOS
        if: runner.os != 'Windows'
        run: |
          cd dist
          zip -r "../${{ matrix.artifact }}-v${{ steps.ver.outputs.value }}.zip" CyberSurvivor/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: "${{ matrix.artifact }}-v${{ steps.ver.outputs.value }}.zip"

  # ── Create a GitHub Release when a version tag is pushed ────────────────────
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true   # puts all zips in the working directory

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.zip'
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}

  # ── Build HTML5 / WebAssembly bundle via pygbag ──────────────────────────────
  build-web:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install SDL2 and audio libraries
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libsdl2-dev libsdl2-mixer-dev libsdl2-image-dev libsdl2-ttf-dev \
            libfreetype6-dev libportmidi-dev python3-dev

      - name: Install dependencies
        run: pip install -r requirements.txt "pygbag>=0.9.0"

      - name: Inject secrets
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          cat > src/secrets.py <<EOF
          SUPABASE_URL      = "https://vrhdbtphzvjfmtjjiirb.supabase.co"
          SUPABASE_ANON_KEY = "${SUPABASE_ANON_KEY}"
          ITCH_GAME_SLUG    = "cyber-survivor"
          ITCH_USERNAME     = "tylertech"
          EOF

      - name: Build web bundle
        run: python -m pygbag --build --app_name CyberSurvivor --width 1280 --height 720 --disable-sound-format-error main.py

      - name: Patch web HTML — theme & viewport
        run: |
          python - <<'PYEOF'
          import pathlib

          p = pathlib.Path("build/web/index.html")
          html = p.read_text(encoding="utf-8")

          # ── 1. Viewport: canvas fills browser, 16:9 aspect, black letterbox ──
          html = html.replace(
              "background-color: transparent;",
              "background-color: transparent;\n            object-fit: contain;"
          )
          html = html.replace("background-color:powderblue;", "background-color:#000000;")
          html = html.replace(
              "body {\n            font-family: arial;",
              "html { height: 100%; }\n        body {\n            height: 100%;\n            font-family: arial;"
          )

          # ── 2. Inject Cyber Survivor theme overrides ──
          THEME_CSS = """
          <style>
          /* ── Cyber Survivor web loader theme ── */
          @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

          html, body {
            background: #000 !important;
            color: #0ff !important;
            font-family: 'Press Start 2P', 'Courier New', monospace !important;
          }

          /* Loading info box */
          .spinner, .info, .emscripten_border, #info {
            background: rgba(20, 10, 40, 0.92) !important;
            border: 1px solid #a855f7 !important;
            border-radius: 8px !important;
            color: #0ff !important;
            font-family: 'Press Start 2P', 'Courier New', monospace !important;
            font-size: 10px !important;
          }

          /* Status text */
          #status, #progress, .status, p, div.emscripten {
            color: #0ff !important;
            font-family: 'Press Start 2P', 'Courier New', monospace !important;
          }

          /* Progress bar */
          progress, #status-progress {
            appearance: none;
            -webkit-appearance: none;
            height: 18px !important;
            border: 1px solid #a855f7 !important;
            border-radius: 4px !important;
            background: #1a0a2e !important;
          }
          progress::-webkit-progress-bar {
            background: #1a0a2e !important;
            border-radius: 4px !important;
          }
          progress::-webkit-progress-value {
            background: linear-gradient(90deg, #a855f7, #0ff) !important;
            border-radius: 4px !important;
          }
          progress::-moz-progress-bar {
            background: linear-gradient(90deg, #a855f7, #0ff) !important;
            border-radius: 4px !important;
          }

          /* Links */
          a { color: #a855f7 !important; }
          a:hover { color: #0ff !important; }

          /* Hide the default green spinner if present */
          .spinner { display: none !important; }

          /* Canvas container */
          .emscripten_border, #canvas-container {
            background: #000 !important;
            border: none !important;
          }
          </style>
          """
          # Inject right before </head>
          html = html.replace("</head>", THEME_CSS + "\n</head>")

          # ── 3. Replace the default loading title ──
          html = html.replace(
              "<title>pygame-wasm</title>",
              "<title>Cyber Survivor</title>"
          )
          # Also try the app-name variant
          html = html.replace(
              "<title>CyberSurvivor</title>",
              "<title>Cyber Survivor</title>"
          )

          p.write_text(html, encoding="utf-8")
          print("Patched index.html — theme + viewport + title")
          PYEOF

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: CyberSurvivor-Web
          path: build/web/
          if-no-files-found: error

  # ── Publish to itch.io via butler ────────────────────────────────────────────
  publish-itch:
    needs: [build, build-web]
    # Run on tag pushes, manual dispatch, OR any push to main
    if: >
      startsWith(github.ref, 'refs/tags/v') ||
      github.event_name == 'workflow_dispatch' ||
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: CyberSurvivor-Windows
          path: dist/

      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: CyberSurvivor-Web
          path: build/web/

      - name: Install butler
        run: |
          curl -L -o butler.zip \
            "https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default"
          unzip butler.zip
          chmod +x butler
          ./butler version

      - name: Push Windows channel
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_CREDENTIALS }}
        run: |
          ZIP=$(ls dist/*.zip | head -1)
          ./butler push "$ZIP" tylertech/cyber-survivor:windows-stable \
            --userversion-file <(echo "${GITHUB_REF_NAME:-dev}")

      - name: Push HTML5 channel
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_CREDENTIALS }}
        run: |
          ./butler push build/web/ tylertech/cyber-survivor:html5 \
            --userversion-file <(echo "${GITHUB_REF_NAME:-dev}")
